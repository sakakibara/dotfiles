# Per-account git identities. This committed file declares ZERO identities, so a
# machine with none composes to an empty include and no id-*.inc files.
#
# Real (employer-specific) identities are machine-local and NEVER committed: put
# them in the mox private layer at <MOX_STATE_DIR>/private/data/git_identities.toml,
# which shadows this file. Each account is a [[git_identities]] entry:
#
#   [[git_identities]]
#   slug        = "acme"                     # filename-safe id
#   email       = "you@acme.com"             # commit identity
#   match_urls  = ["https://github.com/acme/**", "git@github.com:acme/**"]
#   name        = "Your Name"                # optional
#   signing_key = "ssh-ed25519 AAAA..."      # optional; omit -> commits are not signed
#   gh_account  = "your-acme-login"          # optional; account-token picks the gh/HTTPS account
#
# id.local.inc routes each match_urls glob to id-<slug>.inc (both generated by
# src/.config/git/*.gen and identities.local.inc); ~/.config/git/config includes
# identities.local.inc.
git_identities = []
