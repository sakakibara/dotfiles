name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    name: Syntax (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh + fish (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish
      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: brew install fish
      - run: bash etc/ci/syntax.sh

  syntax-powershell:
    name: PowerShell syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = 0
          Get-ChildItem -Recurse -Include *.ps1 |
            Where-Object { $_.FullName -notmatch '\\\.git\\' } |
            ForEach-Object {
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
              if ($errors.Count -gt 0) {
                Write-Host "FAIL: $($_.FullName)"
                $errors | ForEach-Object { Write-Host "  $_" }
                $failed++
              }
            }
          if ($failed -gt 0) { exit 1 }
          Write-Host "all PowerShell scripts parse cleanly"

  render:
    name: chezmoi execute-template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh + fish
        run: sudo apt-get update && sudo apt-get install -y zsh fish
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: bash etc/ci/render.sh

  nvim-tests:
    name: Nvim tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> $GITHUB_PATH
      - name: Run nvim test suite
        run: |
          cd dot_config/nvim
          nvim --headless -l tests/run.lua

  theme-tests-bash:
    name: Theme tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: bash etc/tests/theme.sh

  theme-tests-pwsh:
    name: Theme tests (Windows / pwsh)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse-check theme.ps1 (no test harness yet)
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            "dot_local/bin/theme.ps1", [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host $_ }
            exit 1
          }
          Write-Host "theme.ps1 parses cleanly (TODO: port etc/tests/theme.sh to PowerShell)"
