name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    name: Syntax (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install zsh + fish + luajit + lua5.4 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish luajit lua5.4
      - name: Install fish + luajit + lua (macOS — brew lua is 5.4)
        if: runner.os == 'macOS'
        run: brew install fish luajit lua
      - run: bash etc/ci/syntax.sh

  syntax-powershell:
    name: PowerShell syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = 0
          Get-ChildItem -Recurse -Include *.ps1 |
            Where-Object { $_.FullName -notmatch '\\\.git\\' } |
            ForEach-Object {
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
              if ($errors.Count -gt 0) {
                Write-Host "FAIL: $($_.FullName)"
                $errors | ForEach-Object { Write-Host "  $_" }
                $failed++
              }
            }
          if ($failed -gt 0) { exit 1 }
          Write-Host "all PowerShell scripts parse cleanly"

  render:
    name: chezmoi execute-template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install zsh + fish + luajit
        run: sudo apt-get update && sudo apt-get install -y zsh fish luajit
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: bash etc/ci/render.sh

  nvim-tests:
    name: Nvim tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> $GITHUB_PATH
      - name: Run nvim test suite
        run: |
          cd dot_config/nvim
          nvim --headless -l tests/run.lua
      - name: Smoke-load actual config (cold start with plugin install)
        run: |
          # Point nvim at a *copy* of the chezmoi-source nvim config so
          # vim.pack's lockfile (and any other side-effect writes) land in
          # a throwaway dir, not the repo. Catches "init.lua references a
          # removed plugin" / "lib/X.lua has a typo" style regressions
          # that the unit tests miss. Plugin install pulls from upstream;
          # transient flakes will fail here.
          SMOKE_DIR=$(mktemp -d)
          cp -r dot_config "$SMOKE_DIR/"
          export XDG_CONFIG_HOME="$SMOKE_DIR/dot_config"
          export XDG_DATA_HOME="$SMOKE_DIR/data"
          export XDG_CACHE_HOME="$SMOKE_DIR/cache"
          export XDG_STATE_HOME="$SMOKE_DIR/state"
          nvim --headless +q

  theme-tests-bash:
    name: Theme tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - run: bash etc/tests/theme.sh

  bash-lib-tests:
    name: Bash lib tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install chezmoi (used by dotfiles wrapper tests)
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: store (set + map containers)
        run: bash etc/tests/store.sh
      - name: pick (interactive runner)
        run: bash etc/tests/pick.sh
      - name: packages (parser)
        run: bash etc/tests/packages.sh
      - name: sync (diff + apply)
        run: bash etc/tests/sync.sh
      - name: dotfiles wrapper
        run: bash etc/tests/dotfiles_wrapper.sh

  pwsh-tests:
    name: PowerShell tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: theme.ps1 (full suite via HttpListener)
        shell: pwsh
        run: pwsh -NoProfile -File etc/tests/theme.ps1
      - name: pick.ps1 (parse + non-interactive paths)
        shell: pwsh
        run: pwsh -NoProfile -File etc/tests/pick.ps1
      - name: sync.ps1 (parsers + format + apply)
        shell: pwsh
        run: pwsh -NoProfile -File etc/tests/sync.ps1
      - name: dotfiles.ps1 (wrapper smoke)
        shell: pwsh
        run: pwsh -NoProfile -File etc/tests/dotfiles_wrapper.ps1

  validate-packages-fedora:
    name: Validate packages (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v5
      - run: dnf -y check-update || true
      - run: bash etc/ci/validate-packages.sh fedora

  validate-packages-debian:
    name: Validate packages (Debian)
    runs-on: ubuntu-latest
    container: debian:stable
    steps:
      - uses: actions/checkout@v5
      - run: apt-get update
      - run: bash etc/ci/validate-packages.sh debian

  validate-packages-arch:
    name: Validate packages (Arch)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v5
      - run: pacman -Syu --noconfirm
      - run: bash etc/ci/validate-packages.sh arch

  validate-packages-suse:
    name: Validate packages (openSUSE)
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - run: zypper --non-interactive install -y bash git tar
      - uses: actions/checkout@v5
      - run: zypper --non-interactive refresh
      - run: bash etc/ci/validate-packages.sh suse
