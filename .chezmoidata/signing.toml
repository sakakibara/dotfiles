# SSH commit signing via 1Password.
#
# Only the PERSONAL signing public key is committed. It is already public on
# github.com/sakakibara (the same identity as this repo), so committing it
# reveals nothing new. The WORK signing key — though also a public key — is
# deliberately NOT committed: publishing it here would let anyone correlate
# this personal repo with the work GitHub account by key fingerprint. It lives
# in local data instead (.chezmoi.toml.tmpl -> [data.signing] work_key), merged
# into `.signing` at runtime so templates still read `.signing.work_key`.
#
# Which key a repo uses is chosen by GitHub remote, not by machine: the
# machine default follows `profile`, and repos on github.com/sakakibara/*
# override to the personal key via the [includeIf] blocks in dot_gitconfig.tmpl.
#
# Bootstrap a signing key (once ever per account):
#   1. In 1Password: New Item > SSH Key > generate (it produces ed25519).
#   2. Personal key -> paste below; work key -> paste into local [data.signing].
#   3. On GitHub (the matching account): Settings > SSH and GPG keys >
#      New SSH key, type "Signing Key", paste the same string.
#
# Per-machine bootstrap (once per machine):
#   1. Install 1Password and sign in.
#   2. Settings > Developer > "Use the SSH agent" -> on.
#   3. chezmoi apply.
#
# An empty key for the active account disables the signing block in
# .gitconfig (so a fresh machine without 1Password configured won't fail
# every commit).
[signing]
# Personal GitHub account (github.com/sakakibara).
personal_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC1HaB5DIRwgKQ2E35VSiESgSwtVwCIpvyOFo8tq6WCd"

# Route all SSH auth (cloning git@github.com, sshing into servers, etc.)
# through the 1Password agent. Off by default: enabling overrides any
# keys you currently have in ~/.ssh/id_* — they become invisible to
# OpenSSH unless also imported into 1Password. Commit signing via
# op-ssh-sign works regardless of this flag.
use_1password_ssh_agent = false
